name: Build Electron Desktop Apps

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-mac:
    strategy:
      matrix:
        include:
          - os: macos-14
            arch: arm64
            electron_args: "--mac dmg --arm64"
          - os: macos-13
            arch: x64
            electron_args: "--mac dmg --x64"

    runs-on: ${{ matrix.os }}
    name: macOS ${{ matrix.arch }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Python backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pyinstaller

      - name: Build backend binary (PyInstaller)
        run: |
          python -m PyInstaller --noconfirm --clean \
            --distpath backend/dist-electron \
            backend-api.spec

      - name: Verify backend binary
        run: |
          file backend/dist-electron/backend-api/backend-api
          ls -lh backend/dist-electron/backend-api/backend-api

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Build Electron DMG
        working-directory: frontend
        run: npx electron-builder ${{ matrix.electron_args }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: dmg-${{ matrix.arch }}
          path: release/*.dmg
          retention-days: 30

  release:
    needs: build-mac
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all DMG artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lh artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.dmg
          generate_release_notes: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
