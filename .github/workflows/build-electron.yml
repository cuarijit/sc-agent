name: Build Electron Desktop Apps

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-mac-arm64:
    runs-on: macos-latest
    name: macOS arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Python backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pyinstaller

      - name: Build backend binary (PyInstaller)
        run: |
          python -m PyInstaller --noconfirm --clean \
            --distpath backend/dist-electron \
            backend-api.spec

      - name: Verify backend binary
        run: |
          file backend/dist-electron/backend-api/backend-api
          ls -lh backend/dist-electron/backend-api/backend-api

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Build Electron DMG (arm64)
        working-directory: frontend
        run: npx electron-builder --mac dmg --arm64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: dmg-arm64
          path: release/*.dmg
          retention-days: 30

  build-mac-x64:
    runs-on: macos-latest
    name: macOS x64 (cross-compile via Rosetta)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Python 3.12 (x86_64 via Rosetta)
        run: |
          arch -x86_64 /bin/bash -c '
            curl -sS https://www.python.org/ftp/python/3.12.8/python-3.12.8-macos11.pkg -o /tmp/python.pkg
            sudo installer -pkg /tmp/python.pkg -target /
          '
          PYTHON_X64="/Library/Frameworks/Python.framework/Versions/3.12/bin/python3.12"
          echo "PYTHON_X64=$PYTHON_X64" >> $GITHUB_ENV

      - name: Create x64 venv and install dependencies
        run: |
          arch -x86_64 $PYTHON_X64 -m venv .venv-x64
          source .venv-x64/bin/activate
          arch -x86_64 pip install --upgrade pip
          arch -x86_64 pip install -r backend/requirements.txt
          arch -x86_64 pip install pyinstaller

      - name: Build backend binary (x86_64)
        run: |
          source .venv-x64/bin/activate
          arch -x86_64 python -m PyInstaller --noconfirm --clean \
            --distpath backend/dist-electron \
            backend-api.spec

      - name: Verify backend binary is x86_64
        run: |
          file backend/dist-electron/backend-api/backend-api
          file backend/dist-electron/backend-api/backend-api | grep -q x86_64

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Build Electron DMG (x64)
        working-directory: frontend
        run: npx electron-builder --mac dmg --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: dmg-x64
          path: release/*.dmg
          retention-days: 30

  build-windows:
    runs-on: windows-latest
    name: Windows x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Python backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pyinstaller

      - name: Build backend binary (PyInstaller)
        run: |
          python -m PyInstaller --noconfirm --clean --distpath backend/dist-electron backend-api.spec

      - name: Verify backend binary
        run: |
          Get-Item backend\dist-electron\backend-api\backend-api.exe | Select-Object FullName, Length

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Build Electron Windows installer
        working-directory: frontend
        run: npx electron-builder --win nsis --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: exe-win-x64
          path: release/*.exe
          retention-days: 30

  release:
    needs: [build-mac-arm64, build-mac-x64, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lh artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.dmg
            artifacts/*.exe
          generate_release_notes: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
