name: Build & Push Docker Images

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  REPO_LOWER: ${{ github.repository_owner }}

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set lowercase repo owner
        run: echo "OWNER_LC=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      # ── Backend image ──
      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/scp-backend:latest
            ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/scp-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      # ── Frontend image ──
      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/scp-frontend:latest
            ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/scp-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Print deployment instructions
        run: |
          echo "============================================="
          echo "  Docker images pushed to GHCR successfully"
          echo "============================================="
          echo ""
          echo "Backend:  ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/scp-backend:latest"
          echo "Frontend: ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/scp-frontend:latest"
          echo ""
          echo "To run on any server:"
          echo "  docker compose -f docker-compose-ghcr.yml up -d"
          echo ""
          echo "The app will be available at http://<server-ip>"
